name: Docket
options:
  bundleIdPrefix: com.shimondeitel.docket
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Docket:
    type: application
    platform: iOS
    sources:
      - path: Docket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.docket
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Docket/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DocketTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DocketTests
      - path: Docket.storekit
    dependencies:
      - target: Docket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.docket.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DocketUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DocketUITests
    dependencies:
      - target: Docket
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.docket.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Docket:
    build:
      targets:
        Docket: all
        DocketTests: [test]
        DocketUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Docket.storekit
    test:
      config: Debug
      storeKitConfiguration: Docket.storekit
      targets:
        - DocketTests
        - DocketUITests
    archive:
      config: Release
